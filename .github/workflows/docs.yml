name: Build and Deploy Docs

on:
  push:
    branches: [document]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pixi
        run: curl -fsSL https://pixi.sh/install.sh | sh

      - name: Generate mojo doc JSON
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          pixi run -e default -- mojo doc ./tenmo -o tenmo.json

      - name: Generate Markdown
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          python3 scripts/mojodoc_json_to_markdown.py tenmo.json -o docs/docs/

      - name: Install dependencies
        run: |
          cd docs
          npm install --prefer-offline

      - name: Build Docusaurus
        run: |
          cd docs
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/tenmo
          force_orphan: true
          allow_empty_commit: true
name: Build and Deploy Docs

on:
  push:
    branches: [document]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pixi
        run: curl -fsSL https://pixi.sh/install.sh | sh

      - name: Install dependencies (including mojodoc fork)
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          pixi install

      - name: Generate docs with mojodoc
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          pixi run docs-build

      - name: Install Node and generate HTML
        run: |
          cd docs
          npm install marked@4
          node generate.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/generated
          force_orphan: true
          allow_empty_commit: true
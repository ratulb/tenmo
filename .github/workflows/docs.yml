name: Build and Deploy Docs

on:
  push:
    branches: [document]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pixi
        run: curl -fsSL https://pixi.sh/install.sh | sh

      - name: Generate mojo doc JSON
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          pixi run -e default -- mojo doc ./tenmo -o tenmo.json

      - name: Generate Markdown
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          source $HOME/.bashrc
          pixi run -e default -- python3 scripts/mojodoc_json_to_markdown.py tenmo.json -o docs/md/

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marked and generate HTML
        run: |
          npm install marked
          node docs/generate.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/generated/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install dependencies via pixi
        run: pixi install

      - name: Build tenmo package
        run: |
          pixi run mojo package tenmo -o tenmo.mojopkg

      - name: Create source archive (tenmo/ only)
        run: |
          git archive HEAD tenmo/ \
            --format=zip \
            --prefix=tenmo-${{ github.ref_name }}/ \
            -o tenmo-src-${{ github.ref_name }}.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tenmo.mojopkg
            tenmo-src-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          generate_release_notes: false

# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for softprops/action-gh-release to upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install dependencies via pixi
        run: pixi install

      - name: Build tenmo package
        run: |
          pixi run mojo package tenmo -o tenmo-${{ matrix.os }}.mojopkg

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tenmo-${{ matrix.os }}.mojopkg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

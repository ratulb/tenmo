name: Mojo Tests

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - count_unique
          - compare
          - allany
          - power
          - onehot
          - maxmin_scalar
          - contiguous
          - item
          - intarray
          - mm2d
          - relu
          - shuffle
          - permute
          - unsqueeze
          - gradbox
          - transpose
          - ndb
          - ce
          - buffers
          - views
          - shapes
          - shapebroadcast
          - strides
          - validators
          - losses
          - tanh
          - tensors
          - indexhelper
          - utils
          - mmnd
          - mv
          - vm
          - argminmax
          - minmax
          - repeat
          - tiles
          - linspace
          - slice
          - softmax
          - flatten
          - squeeze
          - sgd
          - matmul
          - dropout
          - stack
          - concat
          - std_variance
          - variance
          - pad
          - fill
          - chunk
          - logarithm
          - blas
          - data
          - scalar
          - broadcast
          - expand
          - npiop

    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install dependencies via pixi
        run: pixi install

      - name: Run test — ${{ matrix.test }}
        id: run_test
        run: |
          chmod +x execute.sh
          pixi run ./execute.sh ${{ matrix.test }}

      - name: Report failure
        if: failure()
        run: echo "::error::Test '${{ matrix.test }}' FAILED"

  test-gpu:
    runs-on: self-hosted
    if: false  # flip to true when a GPU self-hosted runner is registered
    strategy:
      fail-fast: false
      matrix:
        test:
          - gpu
          - gpusummean
          - gpu_expand
          - count_unique
          - compare
          - allany
          - power
          - onehot
          - maxmin_scalar
          - contiguous
          - item
          - intarray
          - mm2d
          - relu
          - shuffle
          - permute
          - unsqueeze
          - gradbox
          - transpose
          - ndb
          - ce
          - buffers
          - views
          - shapes
          - shapebroadcast
          - strides
          - validators
          - losses
          - tanh
          - tensors
          - indexhelper
          - utils
          - mmnd
          - mv
          - vm
          - argminmax
          - minmax
          - repeat
          - tiles
          - linspace
          - slice
          - softmax
          - flatten
          - squeeze
          - sgd
          - matmul
          - dropout
          - stack
          - concat
          - std_variance
          - variance
          - pad
          - fill
          - chunk
          - logarithm
          - blas
          - data
          - scalar
          - broadcast
          - expand
          - npiop

    steps:
      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install dependencies via pixi
        run: pixi install

      - name: Run GPU test — ${{ matrix.test }}
        id: run_gpu_test
        run: |
          chmod +x execute.sh
          pixi run ./execute.sh ${{ matrix.test }}

      - name: Report failure
        if: failure()
        run: echo "::error::GPU Test '${{ matrix.test }}' FAILED"

  summary:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Write test summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

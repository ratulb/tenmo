name: Mojo Tests

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

env:
  MAX_RETRIES: 2   # ← change this to retry more or fewer times on failure

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        test:
          - attn_matmul
          - variance
          - variance_and_std
          - std_variance
          - sigmoid
          - summean
          - exp
          - transmute
          - count_unique
          - compare
          - allany
          - power
          - onehot
          - maxmin_scalar
          - contiguous
          - item
          - intarray
          - mm2d
          - relu
          - shuffle
          - permute
          - unsqueeze
          - gradbox
          - transpose
          - ndb
          - ce
          - buffers
          - views
          - shapes
          - shapebroadcast
          - strides
          - validators
          - losses
          - tanh
          - tensors
          - indexhelper
          - utils
          - mmnd
          - mv
          - vm
          - argminmax
          - minmax
          - repeat
          - tiles
          - linspace
          - slice
          - softmax
          - flatten
          - squeeze
          - sgd
          - matmul
          - dropout
          - stack
          - concat
          - pad
          - fill
          - chunk
          - logarithm
          - blas
          - data
          - scalar
          - broadcast
          - expand
          - npiop

    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install dependencies via pixi
        run: pixi install

      - name: Run test — ${{ matrix.test }} (with retry)
        id: run_test
        env:
          MOJO_STACK_SIZE: 67108864   # 64MB — default is 8MB
        run: |
          ulimit -s unlimited
          attempt=0
          exit_code=0
          while [ $attempt -le ${{ env.MAX_RETRIES }} ]; do
            if [ $attempt -gt 0 ]; then
              echo "::warning::Test '${{ matrix.test }}' failed — retry $attempt of ${{ env.MAX_RETRIES }}"
            fi
            chmod +x execute.sh
            pixi run ./execute.sh ${{ matrix.test }}
            exit_code=$?
            if [ $exit_code -eq 0 ]; then
              echo "Test '${{ matrix.test }}' passed on attempt $((attempt + 1))"
              exit 0
            fi
            attempt=$((attempt + 1))
          done
          echo "::error::Test '${{ matrix.test }}' FAILED after ${{ env.MAX_RETRIES }} retries"
          exit $exit_code

  test-gpu:
    runs-on: self-hosted
    if: false  # flip to true when a GPU self-hosted runner is registered
    strategy:
      fail-fast: false
      matrix:
        test:
          - attn_matmul
          - sigmoid
          - variance
          - std_variance
          - variance_and_std
          - summean
          - exp
          - transmute
          - gpu
          - gpusummean
          - gpu_expand
          - count_unique
          - compare
          - allany
          - power
          - onehot
          - maxmin_scalar
          - contiguous
          - item
          - intarray
          - mm2d
          - relu
          - shuffle
          - permute
          - unsqueeze
          - gradbox
          - transpose
          - ndb
          - ce
          - buffers
          - views
          - shapes
          - shapebroadcast
          - strides
          - validators
          - losses
          - tanh
          - tensors
          - indexhelper
          - utils
          - mmnd
          - mv
          - vm
          - argminmax
          - minmax
          - repeat
          - tiles
          - linspace
          - slice
          - softmax
          - flatten
          - squeeze
          - sgd
          - matmul
          - dropout
          - stack
          - concat
          - std_variance
          - variance
          - pad
          - fill
          - chunk
          - logarithm
          - blas
          - data
          - scalar
          - broadcast
          - expand
          - npiop

    steps:
      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install dependencies via pixi
        run: pixi install

      - name: Run GPU test — ${{ matrix.test }} (with retry)
        id: run_gpu_test
        run: |
          attempt=0
          exit_code=0
          while [ $attempt -le ${{ env.MAX_RETRIES }} ]; do
            if [ $attempt -gt 0 ]; then
              echo "::warning::GPU test '${{ matrix.test }}' failed — retry $attempt of ${{ env.MAX_RETRIES }}"
            fi
            chmod +x execute.sh
            pixi run ./execute.sh ${{ matrix.test }}
            exit_code=$?
            if [ $exit_code -eq 0 ]; then
              echo "GPU test '${{ matrix.test }}' passed on attempt $((attempt + 1))"
              exit 0
            fi
            attempt=$((attempt + 1))
          done
          echo "::error::GPU Test '${{ matrix.test }}' FAILED after ${{ env.MAX_RETRIES }} retries"
          exit $exit_code

  summary:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Write test summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Max retries per test: \`${{ env.MAX_RETRIES }}\`" >> $GITHUB_STEP_SUMMARY

name: Mojo Tests

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # continue running other tests even if one fails
      matrix:
        test:
          - count_unique
          - compare
          - allany
          - power
          - onehot
          - maxmin_scalar
          - contiguous
          - item
          - intarray
          - mm2d
          - relu
          - shuffle
          - permute
          - unsqueeze
          - gradbox
          - transpose
          - ndb
          - ce
          - buffers
          - views
          - shapes
          - shapebroadcast
          - strides
          - validators
          - losses
          - tanh
          - tensors
          - indexhelper
          - utils

    steps:
      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install dependencies via pixi
        run: pixi install

      - name: Run test — ${{ matrix.test }}
        run: |
          chmod +x execute.sh
          pixi run ./execute.sh ${{ matrix.test }}

      - name: Report failure
        if: failure()
        run: echo "::error::Test '${{ matrix.test }}' FAILED"

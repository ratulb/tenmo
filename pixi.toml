[workspace]
channels = ["conda-forge"]
name = "tenmo"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.10,<3.15"
jinja2 = ">=3.0"

[pypi-dependencies]
mnist-datasets = ">=0.14, <0.15"
pure-cifar-10 = ">=0.1.1"
mojodoc = { git = "https://github.com/ratulb/mojodoc.git", branch = "main" }

[environments]
default = ["default"]

[tasks]
docs-build = "mojodoc ./tenmo --out-dir target/doc --base-url /tenmo/"

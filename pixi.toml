[workspace]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "tenmo"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[dependencies]
python = ">=3.10,<3.15"
mojo = "==0.26.2"

[pypi-dependencies]
mnist-datasets = ">=0.14, <0.15"
pure-cifar-10 = ">=0.1.1"

[feature.dev.dependencies]
# mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }
mojodoc = { git = "https://github.com/ratulb/mojodoc.git", branch = "main" }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
docs = "mojodoc ./tenmo --open"
docs-build = "mojodoc ./tenmo --out-dir target/doc --base-url /tenmo/"

<p><strong>Constraints:</strong></p>
<p>Can only be used for FP dtypes.</p>
<p><strong>Parameters:</strong></p>
<ul>
<li>​<b>dtype</b> (<a href="https://docs.modular.com/mojo/stdlib/builtin/dtype/DType"><code>DType</code></a>): The value dtype.</li>
</ul>
<p><strong>Returns:</strong></p>
<p><a href="https://docs.modular.com/mojo/stdlib/builtin/simd/#scalar"><code>Scalar</code></a>: The NaN value of the given dtype.</p>
